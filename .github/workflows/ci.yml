name: AIOpsGuard CI

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest flask prometheus-client scikit-learn numpy pandas

      - name: Lint Python with ruff
        run: ruff check app/ anomaly_detector/ agent/ tests/ load_test/ --ignore E501

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short

  validate-dockerfiles:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint app Dockerfile
        run: hadolint app/Dockerfile --ignore DL3008 --ignore DL3013

      - name: Lint anomaly-detector Dockerfile
        run: hadolint anomaly_detector/Dockerfile --ignore DL3008 --ignore DL3013

  validate-k8s:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate K8s manifests (dry-run)
        run: |
          kubectl apply --dry-run=client -f k8s/base/sentiment-deployment.yaml
          kubectl apply --dry-run=client -f k8s/base/sentiment-service.yaml
          kubectl apply --dry-run=client -f k8s/base/mlflow-deployment.yaml
          kubectl apply --dry-run=client -f k8s/base/anomaly-detector-deployment.yaml
