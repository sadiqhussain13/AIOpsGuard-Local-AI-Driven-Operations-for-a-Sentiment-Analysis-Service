version: "3.9"

services:
  # ── Ollama (local LLM) ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask sentiment-analysis app ───────────────────────────────────────────
  sentiment-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: sentiment-app
    ports:
      - "5000:5000"
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "mistral"
      FAILURE_RATE: "0.05"
      PORT: "5000"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    user: "1001:1001"

  # ── Anomaly detector ──────────────────────────────────────────────────────
  anomaly-detector:
    build:
      context: ./anomaly_detector
      dockerfile: Dockerfile
    container_name: anomaly-detector
    ports:
      - "8080:8080"
    volumes:
      - ./model:/app/model:ro
    environment:
      MODEL_PATH: "/app/model/anomaly_model.pkl"
      PORT: "8080"
    user: "1001:1001"

  # ── MLflow ────────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: mlflow
    ports:
      - "5001:5001"
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5001
        --backend-store-uri sqlite:////mlflow/mlflow.db
        --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - sentiment-app
      - anomaly-detector

  # ── Loki ──────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.6
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yaml

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/aiopsguard.json:ro
    depends_on:
      - prometheus
      - loki

volumes:
  ollama_data:
  mlflow_data:
  loki_data:
  grafana_data:
