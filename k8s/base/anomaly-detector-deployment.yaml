apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-detector
  labels:
    app: anomaly-detector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anomaly-detector
  template:
    metadata:
      labels:
        app: anomaly-detector
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: anomaly-detector
          image: aiopsguard/anomaly-detector:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: MODEL_PATH
              value: "/app/model/anomaly_model.pkl"
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - mountPath: /app/model
              name: model-volume
      volumes:
        - name: model-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: anomaly-detector
  labels:
    app: anomaly-detector
spec:
  type: ClusterIP
  selector:
    app: anomaly-detector
  ports:
    - name: http
      port: 8080
      targetPort: 8080
