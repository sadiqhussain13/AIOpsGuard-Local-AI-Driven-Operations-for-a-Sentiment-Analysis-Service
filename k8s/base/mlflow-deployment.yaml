apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.12.1
          imagePullPolicy: IfNotPresent
          args:
            - mlflow
            - server
            - --host=0.0.0.0
            - --port=5001
            - --backend-store-uri=sqlite:///mlflow/mlflow.db
            - --default-artifact-root=/mlflow/artifacts
          ports:
            - containerPort: 5001
          env:
            - name: MLFLOW_TRACKING_URI
              value: "sqlite:///mlflow/mlflow.db"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - mountPath: /mlflow
              name: mlflow-storage
      volumes:
        - name: mlflow-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  labels:
    app: mlflow
spec:
  type: NodePort
  selector:
    app: mlflow
  ports:
    - name: http
      port: 5001
      targetPort: 5001
      nodePort: 30501
