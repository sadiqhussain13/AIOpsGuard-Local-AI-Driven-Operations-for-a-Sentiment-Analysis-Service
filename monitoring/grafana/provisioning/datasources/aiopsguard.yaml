apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: aiopsguard-prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    version: 1
    editable: false
    jsonData:
      httpMethod: GET
      timeInterval: "15s"

  - name: Loki
    type: loki
    uid: aiopsguard-loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    version: 1
    editable: false
