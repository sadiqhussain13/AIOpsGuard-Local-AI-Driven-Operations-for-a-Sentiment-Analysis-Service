global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "aiopsguard"

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: "sentiment-app"
    static_configs:
      - targets: ["localhost:5000"]
    metrics_path: /metrics

  - job_name: "anomaly-detector"
    static_configs:
      - targets: ["localhost:8080"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
